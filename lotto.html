<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 생성기</title>
    <style>
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }

        .container {
            background-color: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 {
            color: #1a1a1a;
            margin-bottom: 2rem;
        }

        #lotto-numbers {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 2rem;
            min-height: 60px;
        }

        .ball {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            animation: bounce 0.5s ease-out;
        }

        @keyframes bounce {
            0% { transform: scale(0); }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        button {
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: 600;
            background-color: #4f46e5;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        button:hover {
            background-color: #4338ca;
        }

        button:active {
            transform: scale(0.98);
        }

        /* 로또 공 색상 규정 (대략적) */
        .color-1 { background-color: #fbc02d; } /* 1-10 노랑 */
        .color-2 { background-color: #1976d2; } /* 11-20 파랑 */
        .color-3 { background-color: #d32f2f; } /* 21-30 빨강 */
        .color-4 { background-color: #7b1fa2; } /* 31-40 보라/회색(실제는 회색이나 보라로 대체) */
        .color-5 { background-color: #388e3c; } /* 41-45 초록 */
    </style>
</head>
<body>

    <div class="container">
        <h1>로또 번호 생성기</h1>
        <div id="lotto-numbers">
            <!-- 번호가 여기에 생성됩니다 -->
        </div>
        <button onclick="generateLotto()">번호 생성하기</button>
    </div>

    <script>
        function getBallColorClass(num) {
            if (num <= 10) return 'color-1';
            if (num <= 20) return 'color-2';
            if (num <= 30) return 'color-3';
            if (num <= 40) return 'color-4';
            return 'color-5';
        }

        function generateLotto() {
            const container = document.getElementById('lotto-numbers');
            container.innerHTML = ''; // 기존 번호 삭제

            const numbers = [];
            while (numbers.length < 6) {
                const num = Math.floor(Math.random() * 45) + 1;
                if (!numbers.includes(num)) {
                    numbers.push(num);
                }
            }

            // 오름차순 정렬
            numbers.sort((a, b) => a - b);

            // 화면에 표시
            numbers.forEach((num, index) => {
                setTimeout(() => {
                    const ball = document.createElement('div');
                    ball.className = `ball ${getBallColorClass(num)}`;
                    ball.textContent = num;
                    container.appendChild(ball);
                }, index * 100); // 0.1초 간격으로 하나씩 등장
            });
        }
    </script>
</body>
</html>
